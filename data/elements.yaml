elements:
- id: basic_open
  name: Basic Step (Open)
  description: 'Der Grundschritt in offener Haltung. Timing-Muster: Quick-Quick-Slow
    (QQ-S). Leader tritt auf Beat 1 vorwärts (Quick), Break auf Beat 2 (Quick), zurück
    auf Beat 3 (Slow) – Beat 4 ist Pause, kein Schritt. Beat 5-8 gespiegelt: zurück
    (5), Break vorwärts (6), Slow (7), Pause (8). Bildet die Basis für alle On1-Figuren.

    '
  counts: 8
  level: 1
  tags:
  - basic
  - footwork
  - open
  pre:
    hand_hold:
    - R_L
    - two_hand
    - free
    position:
    - open
    slot:
    - leader_slot
    - neutral
    leader_weight:
    - L
    - R
    follower_weight:
    - L
    - R
  post:
    hand_hold: same
    position: open
    slot: leader_slot
    leader_weight: L
    follower_weight: R
  leader_actions:
  - beat: 1
    foot: L
    direction: forward
    description: Schritt vorwärts links (Quick)
  - beat: 2
    foot: R
    direction: break_back
    description: Break – Gewicht auf rechts (Quick)
  - beat: 3
    foot: L
    direction: back
    description: Zurück links (Slow – hält durch Beat 4)
  - beat: 4
    description: PAUSE – kein Schritt, Gewicht bleibt auf links
  - beat: 5
    foot: R
    direction: back
    description: Schritt zurück rechts (Quick)
  - beat: 6
    foot: L
    direction: break_forward
    description: Break vorwärts links (Quick)
  - beat: 7
    foot: R
    direction: back
    description: Zurück rechts (Slow – hält durch Beat 8)
  - beat: 8
    description: PAUSE – kein Schritt, Gewicht bleibt auf rechts
  follower_actions:
  - beat: 1
    foot: R
    direction: back
    description: Schritt zurück rechts (Quick)
  - beat: 2
    foot: L
    direction: break_forward
    description: Break – Gewicht auf links (Quick)
  - beat: 3
    foot: R
    direction: forward
    description: Vorwärts rechts (Slow – hält durch Beat 4)
  - beat: 4
    description: PAUSE – kein Schritt, Gewicht bleibt auf rechts
  - beat: 5
    foot: L
    direction: forward
    description: Schritt vorwärts links (Quick)
  - beat: 6
    foot: R
    direction: break_back
    description: Break zurück rechts (Quick)
  - beat: 7
    foot: L
    direction: forward
    description: Vorwärts links (Slow – hält durch Beat 8)
  - beat: 8
    description: PAUSE – kein Schritt, Gewicht bleibt auf links
  signals:
  - type: none
    description: Kein spezifisches Signal – Grundschritt läuft einfach
  notes: 'Das wichtigste Element. Alle Übergänge kehren hierher zurück. ''same'' bei
    post.hand_hold bedeutet: der Wert wird vom pre-Zustand geerbt.

    '
- id: basic_closed
  name: Basic Step (Closed)
  description: 'Grundschritt in geschlossener Tanzhaltung, gleiches QQ-S Timing wie
    Open Basic. Leader geht vorwärts (1), Break (2), Slow+Pause (3-4) – Follower spiegelverkehrt.
    Beat 5-8: Leader zurück, Follower vorwärts.

    '
  counts: 8
  level: 1
  tags:
  - basic
  - footwork
  - closed
  pre:
    hand_hold:
    - two_hand
    - R_L
    position:
    - closed
    slot:
    - leader_slot
    leader_weight:
    - L
    follower_weight:
    - R
  post:
    hand_hold: same
    position: closed
    slot: leader_slot
    leader_weight: L
    follower_weight: R
  leader_actions:
  - beat: 1
    foot: L
    direction: forward
    description: Vorwärts links, Follower geht zurück (Quick)
  - beat: 2
    foot: R
    direction: break_back
    description: Break (Quick)
  - beat: 3
    foot: L
    direction: back
    description: Zurück (Slow)
  - beat: 4
    description: PAUSE
  - beat: 5
    foot: R
    direction: back
    description: Zurück rechts, Follower geht vorwärts (Quick)
  - beat: 6
    foot: L
    direction: break_forward
    description: Break vorwärts (Quick)
  - beat: 7
    foot: R
    direction: back
    description: Zurück (Slow)
  - beat: 8
    description: PAUSE
  signals:
  - type: frame_tension
    description: Führung über Körperrahmen (Frame), kein Arm-Ziehen
  notes: 'Closed Hold: Leader rechte Hand flach am Follower-Schulterblatt, linke Hand
    erhebt sich, Ellenbogen nach unten.

    '
- id: open_to_closed
  name: Open → Closed Transition
  description: 'Übergang von offener in geschlossene Haltung während des Basic Steps.
    Leader zieht Follower sanft auf Beat 5 heran.

    '
  counts: 8
  level: 1
  tags:
  - transition
  - position_change
  pre:
    hand_hold:
    - R_L
    - two_hand
    position:
    - open
    slot:
    - leader_slot
    leader_weight:
    - L
    follower_weight:
    - L
    - R
  post:
    hand_hold: two_hand
    position: closed
    slot: leader_slot
    leader_weight: L
    follower_weight: R
  signals:
  - type: pull_in
    beat: 5
    hand: R
    description: Rechte Hand zieht leicht an, um Follower heranzuführen
- id: closed_to_open
  name: Closed → Open Transition
  description: 'Öffnung aus geschlossener Haltung. Leader gibt Follower auf Beat 1
    sanft Raum nach hinten.

    '
  counts: 8
  level: 1
  tags:
  - transition
  - position_change
  pre:
    hand_hold:
    - two_hand
    position:
    - closed
    slot:
    - leader_slot
    leader_weight:
    - L
    follower_weight:
    - L
    - R
  post:
    hand_hold: R_L
    position: open
    slot: leader_slot
    leader_weight: L
    follower_weight: R
  signals:
  - type: push_out
    beat: 1
    hand: L
    description: Linke Hand gibt leichten Impuls nach außen
- id: follower_right_turn
  name: Follower Right Turn (Inside Turn)
  description: 'Die häufigste Drehung. Follower dreht sich auf Beat 1-3 im Uhrzeigersinn
    (von Leader aus gesehen). Leader hebt auf Beat 1 den linken Arm, Follower dreht
    unter dem Arm hindurch.

    '
  counts: 8
  level: 1
  tags:
  - turn
  - follower_turn
  - inside_turn
  pre:
    hand_hold:
    - R_L
    - L_R
    - two_hand
    position:
    - open
    slot:
    - leader_slot
    leader_weight:
    - L
    follower_weight:
    - L
    - R
  post:
    hand_hold: R_L
    position: open
    slot: leader_slot
    leader_weight: L
    follower_weight: R
  leader_actions:
  - beat: 1
    description: 'Linken Arm heben (wenn two_hand: rechte Hand lösen)'
    hand: L
    action: raise
  - beat: 2
    description: Arm bleibt oben, gibt Führungskreis
    hand: L
    action: circle_cw
  - beat: 3
    description: Arm senken, Follower hat gedreht
    hand: L
    action: lower
  signals:
  - type: arm_raise
    beat: 1
    hand: L
    description: Linker Arm geht hoch – gibt Raum für Drehung
  - type: circular_wrist
    beat: 1-3
    description: Handgelenk dreht Follower sanft im Uhrzeigersinn
  notes: 'Bei two_hand: rechte Hand auf Beat 1 loslassen, dann auf Beat 5-6 wieder
    in R_L-Haltung aufnehmen. Die Drehung passiert auf Beats 1-3 (Quick-Quick-Slow).

    '
- id: follower_left_turn
  name: Follower Left Turn (Outside Turn)
  description: 'Follower dreht sich gegen den Uhrzeigersinn. Leader nutzt die rechte
    Hand als Führung. Technisch anspruchsvoller als die Right Turn.

    '
  counts: 8
  level: 2
  tags:
  - turn
  - follower_turn
  - outside_turn
  pre:
    hand_hold:
    - R_L
    - two_hand
    position:
    - open
    slot:
    - leader_slot
    leader_weight:
    - L
    follower_weight:
    - L
    - R
  post:
    hand_hold: R_L
    position: open
    slot: leader_slot
    leader_weight: L
    follower_weight: R
  leader_actions:
  - beat: 1
    hand: R
    action: raise_and_cross
    description: Rechte Hand über Follower-Kopf führen, linksdrehend
  signals:
  - type: arm_raise
    beat: 1
    hand: R
    description: Rechter Arm hebt sich, Führung gegen Uhrzeigersinn
  - type: circular_wrist
    beat: 1-3
    direction: counter_clockwise
  notes: 'Leader muss aktiv Raum schaffen – Körper leicht nach rechts. Follower dreht
    links (gegen UZS) auf Beats 1-3.

    '
- id: double_right_turn
  name: Double Right Turn
  description: 'Follower macht zwei Drehungen rechts hintereinander. Leader gibt mehr
    Impuls und mehr Raum auf Beat 1.

    '
  counts: 8
  level: 3
  tags:
  - turn
  - follower_turn
  - inside_turn
  - double
  pre:
    hand_hold:
    - R_L
    - two_hand
    position:
    - open
    slot:
    - leader_slot
    leader_weight:
    - L
    follower_weight:
    - L
    - R
  post:
    hand_hold: R_L
    position: open
    slot: leader_slot
    leader_weight: L
    follower_weight: R
  signals:
  - type: arm_raise_high
    beat: 1
    hand: L
    description: Arm deutlich höher als Single Turn – gibt Signal für Doppeldrehung
  - type: stronger_wrist_impulse
    description: Mehr Rotationsimpuls über das Handgelenk
  notes: 'Timing ist kritisch: Follower braucht mehr Rotationsenergie auf Beat 1.
    Leader darf NICHT mehr ziehen – nur mehr Impuls geben.

    '
- id: cbl
  name: Cross Body Lead (CBL)
  description: 'Das Kernstück des LA-Stils. Leader wechselt auf Beat 1 in die Follower-Lane
    und gibt der Follower Raum, auf Beats 5-7 durch den Slot zu gehen. Leader dreht
    sich am Ende um 90° oder 180°.

    '
  counts: 8
  level: 2
  tags:
  - cbl
  - traveling
  - slot_change
  - core
  pre:
    hand_hold:
    - R_L
    - two_hand
    - L_R
    position:
    - open
    slot:
    - leader_slot
    leader_weight:
    - L
    follower_weight:
    - L
    - R
  post:
    hand_hold: R_L
    position: open
    slot: leader_slot
    leader_weight: L
    follower_weight: R
  leader_actions:
  - beat: 1
    foot: L
    direction: forward_and_left
    description: Schritt vorwärts-links, aus dem Slot heraus
  - beat: 2
    foot: R
    description: Break, nun steht Leader links vom Slot
  - beat: 3
    foot: L
    direction: open_side
    description: Gewicht-Transfer, Körper öffnet den Slot
  - beat: 5
    foot: R
    direction: rotate_180
    description: Follower geht durch – Leader dreht sich
  - beat: 6
    foot: L
    description: Break, neuer Basic beginnt
  - beat: 7
    foot: R
  signals:
  - type: body_open
    beat: 1-3
    description: Linke Schulter geht zurück, öffnet den Weg für Follower
  - type: gentle_forward_lead
    beat: 5
    hand: R
    description: Rechte Hand gibt sanften Vorwärts-Impuls an Follower
  notes: 'Fehler vermeiden: Leader NICHT an der Follower ziehen! Der Slot wird durch
    Körperrotation geöffnet, nicht durch Arm-Kraft. Am Ende steht Leader wieder in
    original Position (Lanes getauscht und zurück).

    '
- id: cbl_with_right_turn
  name: CBL with Follower Right Turn
  description: 'CBL kombiniert mit einer Rechtsdrehung der Follower. Die Follower
    dreht sich auf Beat 5-7 während sie durch den Slot geht.

    '
  counts: 8
  level: 2
  tags:
  - cbl
  - turn
  - follower_turn
  - combo
  pre:
    hand_hold:
    - R_L
    - two_hand
    position:
