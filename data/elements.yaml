elements:
  # ===========================================================================
  # LEVEL 1 – ANFÄNGER (BASICS & DREHUNGEN)
  # ===========================================================================

  - id: basic_open
    name: "Basic Step (Open)"
    description: >
      Der klassische Grundschritt in offener Haltung (R_L).
      Leader bricht auf 1 vor, Follower auf 1 zurück.
    counts: 8
    level: 1
    tags: [basic, open, on1]
    pre:
      hand_hold: [R_L, two_hand, free]
      position: [open]
      slot: [center]
      leader_weight: [R]
      follower_weight: [L]
    post:
      hand_hold: same
      position: open
      slot: center
      leader_weight: R
      follower_weight: L
    leader_actions:
      - beat: "1"
        foot: L
        direction: forward
        description: "Break vorwärts mit links"
      - beat: "2"
        foot: R
        direction: in_place
        description: "Gewicht zurück auf rechts"
      - beat: "3"
        foot: L
        direction: back
        description: "Schritt zurück zur Mitte"
      - beat: "5"
        foot: R
        direction: back
        description: "Break rückwärts mit rechts"
      - beat: "6"
        foot: L
        direction: in_place
        description: "Gewicht vor auf links"
      - beat: "7"
        foot: R
        direction: forward
        description: "Schritt vor zur Mitte"
    follower_actions:
      - beat: "1"
        foot: R
        direction: back
        description: "Break rückwärts mit rechts"
      - beat: "2"
        foot: L
        direction: in_place
        description: "Gewicht vor auf links"
      - beat: "3"
        foot: R
        direction: forward
        description: "Schritt vor zur Mitte"
      - beat: "5"
        foot: L
        direction: forward
        description: "Break vorwärts mit links"
      - beat: "6"
        foot: R
        direction: in_place
        description: "Gewicht zurück auf rechts"
      - beat: "7"
        foot: L
        direction: back
        description: "Schritt zurück zur Mitte"
    signals:
      - type: connection
        description: "Leichter Zug/Druck in der R_L Verbindung zur Synchronisation"

  - id: basic_closed
    name: "Basic Step (Closed)"
    description: >
      Grundschritt in geschlossener Tanzhaltung. 
      Der Leader hat die rechte Hand am Schulterblatt des Followers.
    counts: 8
    level: 1
    tags: [basic, closed, on1]
    pre:
      hand_hold: [closed]
      position: [closed]
      slot: [center]
      leader_weight: [R]
      follower_weight: [L]
    post:
      hand_hold: closed
      position: closed
      slot: center
      leader_weight: R
      follower_weight: L
    leader_actions:
      - beat: "1"
        foot: L
        direction: forward
        description: "Break vorwärts im Frame"
      - beat: "2"
        foot: R
        direction: in_place
      - beat: "3"
        foot: L
        direction: back
      - beat: "5"
        foot: R
        direction: back
      - beat: "6"
        foot: L
        direction: in_place
      - beat: "7"
        foot: R
        direction: forward
    follower_actions:
      - beat: "1"
        foot: R
        direction: back
      - beat: "2"
        foot: L
        direction: in_place
      - beat: "3"
        foot: R
        direction: forward
      - beat: "5"
        foot: L
        direction: forward
      - beat: "6"
        foot: R
        direction: in_place
      - beat: "7"
        foot: L
        direction: back

  - id: side_basic
    name: "Side Basic"
    description: "Grundschritt zur Seite (Guapea-ähnlich oder einfach Side-Steps)."
    counts: 8
    level: 1
    tags: [basic, open, side]
    pre:
      hand_hold: [R_L, two_hand]
      position: [open]
      slot: [center]
      leader_weight: [R]
      follower_weight: [L]
    post:
      hand_hold: same
      position: open
      slot: center
      leader_weight: R
      follower_weight: L
    leader_actions:
      - beat: "1"
        foot: L
        direction: left
        description: "Schritt nach links"
      - beat: "2"
        foot: R
        direction: in_place
      - beat: "3"
        foot: L
        direction: center
      - beat: "5"
        foot: R
        direction: right
        description: "Schritt nach rechts"
      - beat: "6"
        foot: L
        direction: in_place
      - beat: "7"
        foot: R
        direction: center
    follower_actions:
      - beat: "1"
        foot: R
        direction: right
      - beat: "2"
        foot: L
        direction: in_place
      - beat: "3"
        foot: R
        direction: center
      - beat: "5"
        foot: L
        direction: left
      - beat: "6"
        foot: R
        direction: in_place
      - beat: "7"
        foot: L
        direction: center

  - id: open_to_closed
    name: "Open → Closed Transition"
    description: "Vom Open Hold in die geschlossene Haltung wechseln."
    counts: 8
    level: 1
    tags: [transition, closed]
    pre:
      hand_hold: [R_L, two_hand]
      position: [open]
      slot: [center]
      leader_weight: [R]
      follower_weight: [L]
    post:
      hand_hold: closed
      position: closed
      slot: center
      leader_weight: R
      follower_weight: L
    leader_actions:
      - beat: "1"
        foot: L
        direction: forward
      - beat: "2"
        foot: R
        direction: in_place
      - beat: "3"
        foot: L
        direction: center
      - beat: "5"
        foot: R
        direction: back
        description: "Rechte Hand zum Rücken des Followers führen"
      - beat: "6"
        foot: L
        direction: in_place
      - beat: "7"
        foot: R
        direction: forward
        description: "In geschlossener Haltung sammeln"
    follower_actions:
      - beat: "1"
        foot: R
        direction: back
      - beat: "2"
        foot: L
        direction: in_place
      - beat: "3"
        foot: R
        direction: forward
      - beat: "5"
        foot: L
        direction: forward
      - beat: "6"
        foot: R
        direction: in_place
      - beat: "7"
        foot: L
        direction: back

  - id: closed_to_open
    name: "Closed → Open Transition"
    description: "Aus der geschlossenen Haltung lösen."
    counts: 8
    level: 1
    tags: [transition, open]
    pre:
      hand_hold: [closed]
      position: [closed]
      slot: [center]
      leader_weight: [R]
      follower_weight: [L]
    post:
      hand_hold: R_L
      position: open
      slot: center
      leader_weight: R
      follower_weight: L
    leader_actions:
      - beat: "1"
        foot: L
        direction: forward
      - beat: "2"
        foot: R
        direction: in_place
      - beat: "3"
        foot: L
        direction: center
      - beat: "5"
        action: release_back
        description: "Rechte Hand vom Rücken lösen und nach hinten schieben"
      - beat: "6"
        foot: L
        direction: in_place
      - beat: "7"
        foot: R
        direction: forward
    follower_actions:
      - beat: "1"
        foot: R
        direction: back
      - beat: "2"
        foot: L
        direction: in_place
      - beat: "3"
        foot: R
        direction: forward
      - beat: "5"
        foot: L
        direction: forward
        description: "Vom Leader weg in den offenen Raum"
      - beat: "6"
        foot: R
        direction: in_place
      - beat: "7"
        foot: L
        direction: back

  - id: follower_right_turn
    name: "Follower Right Turn"
    description: "Standard Rechtsdrehung für den Follower auf 5-6-7."
    counts: 8
    level: 1
    tags: [turn, follower_turn, right]
    pre:
      hand_hold: [R_L, L_R, two_hand, hammerlock]
      position: [open]
      slot: [center]
      leader_weight: [R]
      follower_weight: [L]
    post:
      hand_hold: same
      position: open
      slot: center
      leader_weight: R
      follower_weight: L
    leader_actions:
      - beat: "1-3"
        description: "Vorbereitung durch normalen Break"
      - beat: "5"
        hand: L
        action: raise
        description: "Hand heben (J-Loop oder direktes Heben)"
      - beat: "6"
        hand: L
        action: guide_cw
        description: "Führung im Uhrzeigersinn über dem Kopf des Followers"
      - beat: "7"
        hand: L
        action: lower
        description: "Hand senken"
    follower_actions:
      - beat: "1"
        foot: R
        direction: back
      - beat: "2"
        foot: L
        direction: in_place
      - beat: "3"
        foot: R
        direction: forward
        description: "Vorbereitungsschritt vorwärts"
      - beat: "5"
        foot: L
        direction: forward
        action: turn_cw
        description: "Step-Turn (Pivot) beginnt"
      - beat: "6"
        foot: R
        direction: forward
        action: turn_cw
        description: "Drehung fortsetzen"
      - beat: "7"
        foot: L
        direction: back
        action: complete_turn
        description: "Drehung beenden, Blick zum Leader"

  - id: leader_right_turn
    name: "Leader Right Turn"
    description: "Rechtsdrehung für den Leader auf 1-2-3."
    counts: 8
    level: 1
    tags: [turn, leader_turn, right]
    pre:
      hand_hold: [R_L, two_hand]
      position: [open]
      slot: [center]
      leader_weight: [R]
      follower_weight: [L]
    post:
      hand_hold: R_L
      position: open
      slot: center
      leader_weight: R
      follower_weight: L
    leader_actions:
      - beat: "1"
        foot: L
        direction: forward
        action: turn_cw
        description: "Drehung einleiten"
      - beat: "2"
        foot: R
        direction: back
        action: turn_cw
      - beat: "3"
        foot: L
        direction: center
        action: complete_turn
      - beat: "5-7"
        description: "Rückwärts-Basic zur Stabilisierung"
    follower_actions:
      - beat: "1-3"
        description: "Normaler Rückwärts-Basic"

  # ===========================================================================
  # LEVEL 2 – MITTELSTUFE (CBL & HANDWECHSEL)
  # ===========================================================================

  - id: cbl_basic
    name: "Cross Body Lead (CBL)"
    description: "Das fundamentale Element des LA Style. Platzwechsel auf der Linie."
    counts: 8
    level: 2
    tags: [cbl, traveling, core]
    pre:
      hand_hold: [R_L, L_R, two_hand, closed, hammerlock]
      position: [open, closed]
      slot: [center]
      leader_weight: [R]
      follower_weight: [L]
    post:
      hand_hold: same
      position: open
      slot: center
      leader_weight: R
      follower_weight: L
    leader_actions:
      - beat: "1"
        foot: L
        direction: forward
        description: "Schritt vor, leicht aus dem Slot öffnen"
      - beat: "2"
        foot: R
        direction: side_right
        description: "Slot komplett freigeben (90 Grad Drehung)"
      - beat: "3"
        foot: L
        direction: in_place
        description: "Position halten, Follower Platz machen"
      - beat: "5"
        foot: R
        direction: back
        description: "Follower durch den Slot führen"
      - beat: "6"
        foot: L
        direction: in_place
        description: "Eindrehen zum Follower"
      - beat: "7"
        foot: R
        direction: forward
        description: "Schritt vor zur Mitte"
    follower_actions:
      - beat: "1"
        foot: R
        direction: back
      - beat: "2"
        foot: L
        direction: in_place
      - beat: "3"
        foot: R
        direction: forward
        description: "Vorbereitung zum Durchlaufen"
      - beat: "5"
        foot: L
        direction: forward
        description: "Durch den Slot laufen"
      - beat: "6"
        foot: R
        direction: forward
      - beat: "7"
        foot: L
        direction: back
        action: pivot_180
        description: "Um 180 Grad drehen zum Leader"

  - id: hand_change_front
    name: "Hand Change (Front)"
    description: "Handwechsel R_L zu L_R vor dem Körper."
    counts: 8
    level: 2
    tags: [hand_change, transition]
    pre:
      hand_hold: [R_L]
      position: [open]
      slot: [center]
      leader_weight: [R]
      follower_weight: [L]
    post:
      hand_hold: L_R
      position: open
      slot: center
      leader_weight: R
      follower_weight: L
    leader_actions:
      - beat: "1"
        foot: L
        direction: forward
      - beat: "2"
        foot: R
        direction: in_place
      - beat: "3"
        foot: L
        direction: center
      - beat: "5"
        foot: R
        direction: back
        action: pass_hand
        description: "Hand vor dem Körper an die linke Hand übergeben"
      - beat: "6"
        foot: L
        direction: in_place
      - beat: "7"
        foot: R
        direction: forward
    follower_actions:
      - beat: "1"
        foot: R
        direction: back
      - beat: "2"
        foot: L
        direction: in_place
      - beat: "3"
        foot: R
        direction: forward
      - beat: "5"
        foot: L
        direction: forward
      - beat: "6"
        foot: R
        direction: in_place
      - beat: "7"
        foot: L
        direction: back

  - id: hand_change_behind_back
    name: "Hand Change (Behind Back)"
    description: "Handwechsel hinter dem Rücken des Leaders während eines Basics."
    counts: 8
    level: 2
    tags: [hand_change, transition, behind_back]
    pre:
      hand_hold: [R_L]
      position: [open]
      slot: [center]
      leader_weight: [R]
      follower_weight: [L]
    post:
      hand_hold: L_R
      position: open
      slot: center
      leader_weight: R
      follower_weight: L
    leader_actions:
      - beat: "1"
        foot: L
        direction: forward
        action: lead_to_side
      - beat: "2"
        foot: R
        direction: in_place
        action: hand_behind_back
        description: "Rechte Hand hinter den Rücken führen"
      - beat: "3"
        foot: L
        direction: center
        action: take_with_left
        description: "Mit der linken Hand hinter dem Rücken übernehmen"
      - beat: "5"
        foot: R
        direction: back
      - beat: "6"
        foot: L
        direction: in_place
      - beat: "7"
        foot: R
        direction: forward
    follower_actions:
      - beat: "1"
        foot: R
        direction: back
      - beat: "2"
        foot: L
        direction: in_place
      - beat: "3"
        foot: R
        direction: forward
      - beat: "5"
        foot: L
        direction: forward
      - beat: "6"
        foot: R
        direction: in_place
      - beat: "7"
        foot: L
        direction: back

  - id: two_hand_hold_entry
    name: "Two Hand Hold Entry"
    description: "Die zweite Hand aufnehmen."
    counts: 8
    level: 2
    tags: [hand_change, two_hand]
    pre:
      hand_hold: [R_L, L_R]
      position: [open]
      slot: [center]
      leader_weight: [R]
      follower_weight: [L]
    post:
      hand_hold: two_hand
      position: open
      slot: center
      leader_weight: R
      follower_weight: L
    leader_actions:
      - beat: "1"
        foot: L
        direction: forward
      - beat: "2"
        foot: R
        direction: in_place
      - beat: "3"
        foot: L
        direction: center
      - beat: "5"
        foot: R
        direction: back
        action: offer_hand
        description: "Die freie Hand anbieten"
      - beat: "6"
        foot: L
        direction: in_place
      - beat: "7"
        foot: R
        direction: forward
    follower_actions:
      - beat: "1"
        foot: R
        direction: back
      - beat: "2"
        foot: L
        direction: in_place
      - beat: "3"
        foot: R
        direction: forward
      - beat: "5"
        foot: L
        direction: forward
      - beat: "6"
        foot: R
        direction: in_place
        action: take_hand
        description: "Die angebotene Hand annehmen"
      - beat: "7"
        foot: L
        direction: back

  - id: follower_left_turn_l_r
    name: "Follower Left Turn (L_R)"
    description: "Linksdrehung des Followers, geführt mit der linken Leaderhand an der rechten Followerhand."
    counts: 8
    level: 2
    tags: [turn, follower_turn, left]
    pre:
      hand_hold: [L_R, two_hand]
      position: [open]
      slot: [center]
      leader_weight: [R]
      follower_weight: [L]
    post:
      hand_hold: L_R
      position: open
      slot: center
      leader_weight: R
      follower_weight: L
    leader_actions:
      - beat: "1"
        foot: L
        direction: forward
      - beat: "2"
        foot: R
        direction: in_place
      - beat: "3"
        foot: L
        direction: center
      - beat: "5"
        foot: R
        direction: back
        hand: L
        action: raise
      - beat: "6"
        foot: L
        direction: in_place
        hand: L
        action: guide_ccw
        description: "Führung gegen den Uhrzeigersinn"
      - beat: "7"
        foot: R
        direction: forward
        hand: L
        action: lower
    follower_actions:
      - beat: "1"
        foot: R
        direction: back
      - beat: "2"
        foot: L
        direction: in_place
      - beat: "3"
        foot: R
        direction: forward
      - beat: "5"
        foot: L
        direction: forward
        action: turn_ccw
      - beat: "6"
        foot: R
        direction: forward
        action: turn_ccw
      - beat: "7"
        foot: L
        direction: back
        action: complete_turn

  # ===========================================================================
  # LEVEL 3 – FORTGESCHRITTEN (VARIATIONEN)
  # ===========================================================================

  - id: cbl_inside_turn
    name: "CBL Inside Turn"
    description: "Cross Body Lead mit einer Linksdrehung des Followers auf 5-6-7."
    counts: 8
    level: 3
    tags: [cbl, turn, follower_turn, inside_turn]
    pre:
      hand_hold: [R_L, two_hand]
      position: [open]
      slot: [center]
      leader_weight: [R]
      follower_weight: [L]
    post:
      hand_hold: R_L
      position: open
      slot: center
      leader_weight: R
      follower_weight: L
    leader_actions:
      - beat: "1-3"
        description: "Normale CBL-Vorbereitung (Slot öffnen)"
      - beat: "5"
        hand: L
        action: raise_and_guide_ccw
        description: "Hand heben und Follower zur Linksdrehung 'einkurbeln'"
      - beat: "6"
        hand: L
        action: guide_ccw
      - beat: "7"
        hand: L
        action: lower
    follower_actions:
      - beat: "1-3"
        description: "Normale CBL-Vorbereitung"
      - beat: "5"
        foot: L
        direction: forward
        action: turn_ccw
        description: "In den Slot laufen und Linksdrehung starten"
      - beat: "6"
        foot: R
        direction: forward
        action: turn_ccw
      - beat: "7"
        foot: L
        direction: back
        action: complete_turn

  - id: cbl_outside_turn
    name: "CBL Outside Turn"
    description: "Cross Body Lead mit einer Rechtsdrehung des Followers auf 5-6-7."
    counts: 8
    level: 3
    tags: [cbl, turn, follower_turn, outside_turn]
    pre:
      hand_hold: [R_L, two_hand]
      position: [open]
      slot: [center]
      leader_weight: [R]
      follower_weight: [L]
    post:
      hand_hold: R_L
      position: open
      slot: center
      leader_weight: R
      follower_weight: L
    leader_actions:
      - beat: "1-3"
        description: "Normale CBL-Vorbereitung"
      - beat: "5"
        hand: L
        action: raise_and_guide_cw
        description: "Hand heben und Follower zur Rechtsdrehung führen"
      - beat: "6"
        hand: L
        action: guide_cw
      - beat: "7"
        hand: L
        action: lower
    follower_actions:
      - beat: "5"
        foot: L
        direction: forward
        action: turn_cw
      - beat: "6"
        foot: R
        direction: forward
        action: turn_cw
      - beat: "7"
        foot: L
        direction: back
        action: complete_turn

  - id: copita
    name: "Copita"
    description: "Follower wird auf 1-2-3 in eine Linksdrehung geführt (aber bleibt auf der Seite des Leaders) und auf 5-6-7 wieder rausgeschickt."
    counts: 8
    level: 3
    tags: [cbl, turn, special]
    pre:
      hand_hold: [two_hand]
      position: [open]
      slot: [center]
      leader_weight: [R]
      follower_weight: [L]
    post:
      hand_hold: two_hand
      position: open
      slot: center
      leader_weight: R
      follower_weight: L
    leader_actions:
      - beat: "1"
        foot: L
        direction: forward
        description: "Führung zur Linksdrehung (Inside)"
      - beat: "2"
        foot: R
        direction: back
        description: "Follower 'auffangen' (Compression)"
      - beat: "3"
        foot: L
        direction: center
        description: "Follower steht links neben dem Leader"
      - beat: "5"
        foot: R
        direction: back
        description: "Follower nach rechts rausdrehen (Outside)"
      - beat: "6"
        foot: L
        direction: in_place
      - beat: "7"
        foot: R
        direction: forward
    follower_actions:
      - beat: "1"
        foot: R
        direction: back
      - beat: "2"
        foot: L
        direction: turn_ccw
        description: "Eindrehen (halbe Linksdrehung)"
      - beat: "3"
        foot: R
        direction: in_place
        description: "Steht links vom Leader"
      - beat: "5"
        foot: L
        direction: forward
        action: turn_cw
        description: "Rausdrehen (Rechtsdrehung)"
      - beat: "6"
        foot: R
        direction: turn_cw
      - beat: "7"
        foot: L
        direction: back

  - id: hammerlock_entry
    name: "Hammerlock Entry"
    description: "Follower in eine Rechtsdrehung führen, dabei die untere Hand (L_R) halten, sodass der Arm hinter dem Rücken landet."
    counts: 8
    level: 3
    tags: [turn, hammerlock, hand_change]
    pre:
      hand_hold: [two_hand]
      position: [open]
      slot: [center]
      leader_weight: [R]
      follower_weight: [L]
    post:
      hand_hold: hammerlock
      position: open
      slot: center
      leader_weight: R
      follower_weight: L
    leader_actions:
      - beat: "1"
        foot: L
        direction: forward
      - beat: "2"
        foot: R
        direction: in_place
      - beat: "3"
        foot: L
        direction: center
      - beat: "5"
        foot: R
        direction: back
        hand: L
        action: raise
        description: "Obere Hand heben für Rechtsdrehung"
      - beat: "6"
        foot: L
        direction: in_place
        hand: R
        action: keep_low
        description: "Untere Hand tief halten und hinter den Rücken des Followers führen"
      - beat: "7"
        foot: R
        direction: forward
    follower_actions:
      - beat: "1"
        foot: R
        direction: back
      - beat: "2"
