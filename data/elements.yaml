    - L
    follower_weight:
    - L
    - R
  post:
    hand_hold: R_L
    position: open
    slot: leader_slot
    leader_weight: L
    follower_weight: R
  leader_actions:
  - beat: 1-3
    description: Wie normaler CBL – aus dem Slot heraus
  - beat: 5
    hand: R
    action: raise_and_guide_cw
    description: Rechten Arm heben, Follower in Rechtsdrehung führen
  signals:
  - type: arm_raise
    beat: 5
    hand: R
    description: Rechter Arm hebt sich auf Beat 5 für Follower-Drehung
  notes: 'Dies ist eigentlich ein CBL (Beats 1-4) + Follower Right Turn (Beats 5-8).
    Der Arm-Wechsel passiert fließend.

    '
- id: cbl_with_left_turn
  name: CBL with Follower Left Turn
  description: 'CBL mit Linksdrehung der Follower durch den Slot. Technisch anspruchsvoller
    – Leader muss Arm früh positionieren.

    '
  counts: 8
  level: 3
  tags:
  - cbl
  - turn
  - follower_turn
  - combo
  pre:
    hand_hold:
    - R_L
    - L_R
    - two_hand
    position:
    - open
    slot:
    - leader_slot
    leader_weight:
    - L
    follower_weight:
    - L
    - R
- id: hand_change_front
  name: Hand Change (Front)
