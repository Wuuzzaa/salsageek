elements:
- id: inside_turn_to_hammerlock
  name: Inside Turn to Hammerlock
  description: Linksdrehung des Followers, die direkt im Hammerlock endet (untere
    Hand wird gehalten).
  counts: 8
  level: 3
  tags:
  - turn
  - hammerlock
  - transition
  pre:
    hand_hold:
    - two_hand
    position:
    - open
    slot:
    - center
    leader_weight:
    - R
    follower_weight:
    - L
  post:
    hand_hold: hammerlock
    position: open
    slot: center
    leader_weight: R
    follower_weight: L
  leader_actions:
  - beat: 1-3
    description: Normaler Break
  - beat: '5'
    hand: L
    action: raise_and_guide_ccw
    description: Hand heben für Linksdrehung
  - beat: '6'
    hand: R
    action: wrap_behind_back
    description: Rechte Leaderhand führt linke Followerhand hinter deren Rücken
  - beat: '7'
    description: Hammerlock Position fixieren
  follower_actions:
  - beat: 5-6
    action: turn_ccw
  - beat: '7'
    foot: L
    direction: back
  signals:
  - beat: '5'
    type: connection
    description: Beide Hände bleiben verbunden (Continuous Connection)
