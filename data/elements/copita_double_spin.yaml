elements:
- id: copita_double_spin
  name: Copita with Double Spin
  description: Copita, bei der der Follower am Ende zwei Rechtsdrehungen (Outside)
    macht.
  counts: 8
  level: 4
  tags:
  - special
  - double
  - intermediate
  pre:
    hand_hold:
    - two_hand
    position:
    - open
    slot:
    - center
    leader_weight:
    - R
    follower_weight:
    - L
  post:
    hand_hold: two_hand
    position: open
    slot: center
    leader_weight: R
    follower_weight: L
  leader_actions:
  - beat: 1-3
    description: Eindrehen in die Copita
  - beat: '5'
    hand: both
    action: double_prep_cw
    description: Zwei Drehungen auf dem Rausweg einleiten
  - beat: '6'
    hand: both
    action: guide_cw_fast
  - beat: '7'
    hand: both
    action: lower
  follower_actions:
  - beat: 1-3
    description: Eindrehen in Copita Pose
  - beat: 5-6
    action: double_turn_cw
    description: Zwei schnelle Rechtsdrehungen beim Rausgehen
  - beat: '7'
    foot: L
    direction: back
  signals:
  - beat: '4'
    type: tension
    description: Spannungsaufbau (Compression) im Standbein vor dem Rausdrehen
