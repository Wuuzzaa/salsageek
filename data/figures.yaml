figures:
  # ===========================================================================
  # LEVEL 1 – ANFÄNGER
  # ===========================================================================

  - id: figure_double_basic
    name: "Double Basic"
    description: "Zwei Grundschritte hintereinander zur Stabilisierung."
    level: 1
    sequence:
      - basic_open
      - basic_open
    tags: [basic, beginner]

  - id: figure_basic_right_turn
    name: "Basic + Right Turn"
    description: "Grundschritt gefolgt von einer Rechtsdrehung des Followers."
    level: 1
    sequence:
      - basic_open
      - follower_right_turn
    tags: [basic, turn, beginner]

  - id: figure_open_closed_open
    name: "Open-Closed Transition"
    description: "Wechsel zwischen offener und geschlossener Haltung."
    level: 1
    sequence:
      - open_to_closed
      - basic_closed
      - closed_to_open
    tags: [basic, transition, beginner]

  - id: figure_leader_turn_basic
    name: "Leader Right Turn + Basic"
    description: "Rechtsdrehung des Leaders auf 1-2-3."
    level: 1
    sequence:
      - leader_right_turn
      - basic_open
    tags: [turn, leader, beginner]

  # ===========================================================================
  # LEVEL 2 – MITTELSTUFE (CBL & HANDWECHSEL)
  # ===========================================================================

  - id: figure_classic_cbl
    name: "Classic Cross Body Lead"
    description: "Der Standard-Platzwechsel auf der Linie."
    level: 2
    sequence:
      - basic_open
      - cbl_basic
    tags: [cbl, core, social]

  - id: figure_cbl_right_turn
    name: "CBL + Follower Right Turn"
    description: "Platzwechsel mit anschließender Rechtsdrehung."
    level: 2
    sequence:
      - cbl_basic
      - follower_right_turn
    tags: [cbl, turn, social]

  - id: figure_hand_change_cbl
    name: "Hand Change + CBL"
    description: "Handwechsel vor dem Körper und danach Platzwechsel."
    level: 2
    sequence:
      - hand_change_front
      - cbl_basic
    tags: [hand_change, cbl, social]

  - id: figure_two_hand_right_turn
    name: "Two-Hand Hold Right Turn"
    description: "Rechtsdrehung aus dem Two-Hand Hold."
    level: 2
    sequence:
      - two_hand_hold_entry
      - follower_right_turn
    tags: [two_hand, turn, social]

  # ===========================================================================
  # LEVEL 3 – FORTGESCHRITTEN
  # ===========================================================================

  - id: figure_cbl_inside_turn
    name: "CBL Inside Turn"
    description: "Platzwechsel mit integrierter Linksdrehung."
    level: 3
    sequence:
      - basic_open
      - cbl_inside_turn
    tags: [cbl, turn, inside, intermediate]

  - id: figure_cbl_outside_turn
    name: "CBL Outside Turn"
    description: "Platzwechsel mit integrierter Rechtsdrehung."
    level: 3
    sequence:
      - basic_open
      - cbl_outside_turn
    tags: [cbl, turn, outside, intermediate]

  - id: figure_copita_basic
    name: "Classic Copita"
    description: "Die klassische Copita aus dem Two-Hand Hold."
    level: 3
    sequence:
      - two_hand_hold_entry
      - copita
    tags: [special, turn, intermediate]

  - id: figure_hammerlock_cbl
    name: "Hammerlock to CBL"
    description: "In den Hammerlock eindrehen und über einen CBL wieder rausführen."
    level: 3
    sequence:
      - two_hand_hold_entry
      - hammerlock_entry
      - cbl_basic
    tags: [hammerlock, cbl, intermediate]


  - id: figure_360_classic
    name: "Classic 360"
    description: "CBL mit 360-Drehung des Leaders."
    level: 3
    sequence:
      - basic_open
      - cbl_360
      - basic_open
    tags: [cbl, turn, leader, intermediate]

  - id: figure_double_turn_combo
    name: "Double Turn Combo"
    description: "Basic gefolgt von einer doppelten Rechtsdrehung."
    level: 3
    sequence:
      - basic_open
      - double_right_turn
      - basic_open
    tags: [turn, double, intermediate]

  - id: figure_neck_roll_cbl
    name: "Neck Roll CBL"
    description: "CBL kombiniert mit einem Neck Roll für ein flüssiges Finish."
    level: 3
    sequence:
      - basic_open
      - hand_change_front
      - cbl_basic
      - neck_roll
    tags: [special, wrap, intermediate]

  - id: figure_titanic_exit
    name: "Titanic Exit Figure"
    description: "In die Titanic Pose und wieder zurück."
    level: 3
    sequence:
      - basic_open
      - two_hand_hold_entry
      - titanic_entry
      - titanic_exit
    tags: [special, pose, intermediate]

  - id: figure_advanced_hand_change
    name: "Behind Back CBL"
    description: "CBL mit Handwechsel hinter dem Rücken des Followers."
    level: 3
    sequence:
      - basic_open
      - hand_change_behind_back_follower
      - cbl_basic
    tags: [hand_change, cbl, intermediate]


  - id: figure_double_spin_copita
    name: "The Double Spin Copita"
    description: "Eine Copita mit einem spektakulären Doppel-Spin am Ende."
    level: 4
    sequence:
      - basic_open
      - two_hand_hold_entry
      - copita_double_spin
      - basic_open
    tags: [special, double, turn, intermediate]

  - id: figure_advanced_hammerlock_flow
    name: "Advanced Hammerlock Flow"
    description: "Inside Turn in den Hammerlock und CBL wieder raus."
    level: 3
    sequence:
      - basic_open
      - two_hand_hold_entry
      - inside_turn_to_hammerlock
      - cbl_basic
    tags: [hammerlock, cbl, flow, intermediate]

  - id: figure_hand_toss_variation
    name: "Hand Toss Variation"
    description: "Ein CBL mit einem riskanten aber coolen Hand Toss."
    level: 3
    sequence:
      - basic_open
      - cbl_with_hand_toss
      - basic_open
    tags: [cbl, special, social, intermediate]

  - id: figure_double_left_combo
    name: "Double Left Combo"
    description: "Handwechsel und dann eine doppelte Linksdrehung."
    level: 4
    sequence:
      - basic_open
      - hand_change_front
      - follower_double_left_turn
      - basic_open
    tags: [turn, double, intermediate]


  - id: figure_neck_wrap_combo
    name: "Neck Wrap Combo"
    description: "In den Neck Wrap und mit einem flüssigen Exit wieder raus."
    level: 3
    sequence:
      - basic_open
      - neck_wrap_entry
      - neck_wrap_exit
      - basic_open
    tags: [special, wrap, intermediate]

  - id: figure_sombrero_social
    name: "Sombrero Social"
    description: "Der Sombrero-Klassiker im LA-Style."
    level: 4
    sequence:
      - basic_open
      - two_hand_hold_entry
      - sombrero_la_style
      - sombrero_exit
      - basic_open
    tags: [special, wrap, intermediate]
